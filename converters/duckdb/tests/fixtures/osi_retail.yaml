# Trimmed TPC-DS model used as the converter test fixture.

version: "0.2.0.dev0"

semantic_model:
  - name: tpcds_retail_model
    description: Trimmed TPC-DS retail model for converter tests

    datasets:
      - name: store_sales
        source: tpcds.public.store_sales
        primary_key: [ss_item_sk, ss_ticket_number]
        description: Store sales fact table
        fields:
          - name: ss_item_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_item_sk
          - name: ss_ticket_number
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_ticket_number
          - name: ss_sold_date_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_sold_date_sk
            description: Foreign key to date dimension
          - name: ss_customer_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_customer_sk
          - name: ss_ext_sales_price
            expression:
              dialects:
                - dialect: DUCKDB
                  expression: ss_ext_sales_price
            description: Extended sales price

      - name: date_dim
        source: tpcds.public.date_dim
        primary_key: [d_date_sk]
        fields:
          - name: d_date_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_date_sk
          - name: d_year
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_year
          - name: d_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_date
            dimension:
              is_time: true

      - name: customer
        source: tpcds.public.customer
        primary_key: [c_customer_sk]
        description: Customer dimension
        fields:
          - name: c_customer_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_customer_sk
          - name: c_full_name
            expression:
              dialects:
                - dialect: DUCKDB
                  expression: c_first_name || ' ' || c_last_name
            description: Customer full name

    relationships:
      - name: store_sales_to_date_dim
        from: store_sales
        to: date_dim
        from_columns: [ss_sold_date_sk]
        to_columns: [d_date_sk]
      - name: store_sales_to_customer
        from: store_sales
        to: customer
        from_columns: [ss_customer_sk]
        to_columns: [c_customer_sk]

    metrics:
      - name: total_sales
        expression:
          dialects:
            - dialect: DUCKDB
              expression: SUM(store_sales.ss_ext_sales_price)
        description: Total store sales revenue
      - name: sales_per_customer
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(store_sales.ss_ext_sales_price) / COUNT(DISTINCT customer.c_customer_sk)
