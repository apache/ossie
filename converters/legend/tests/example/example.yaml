# yaml-language-server: $schema=../core-spec/osi-schema.json

# TPC-DS Semantic Model Example
# This example demonstrates the OSI Core Metadata Spec using the TPC-DS benchmark schema
# TPC-DS is a decision support benchmark with a realistic retail business model

version: "0.1.1"

semantic_model:
  - name: tpcds_retail_model
    description: TPC-DS retail semantic model for sales and customer analytics
    ai_context:
      instructions: "Use this semantic model for retail analytics. It provides comprehensive sales, customer, product, and store data from the TPC-DS benchmark. The model supports time-based analysis, customer segmentation, product performance, and store operations metrics."

    datasets:
      # Fact table: Store sales transactions
      - name: store_sales
        source: tpcds.public.store_sales
        primary_key: [ss_item_sk, ss_ticket_number]  # Composite primary key
        unique_keys:
          - [ss_item_sk, ss_ticket_number]  # Composite key: item + ticket number uniquely identifies a line item
        description: Fact table containing all store sales transactions
        ai_context:
          synonyms:
            - "sales transactions"
            - "store purchases"
            - "retail sales"
            - "POS data"

        fields:
          - name: ss_sold_date_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_sold_date_sk
            description: Foreign key to date dimension
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "sale date"
                - "transaction date"

          - name: ss_item_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_item_sk
            description: Foreign key to item dimension
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "product"
                - "item"

          - name: ss_customer_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_customer_sk
            description: Foreign key to customer dimension
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "customer"
                - "buyer"

          - name: ss_store_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_store_sk
            description: Foreign key to store dimension
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "store"
                - "location"

          - name: ss_quantity
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_quantity
            description: Quantity of items sold
            ai_context:
              synonyms:
                - "units sold"
                - "quantity"

          - name: ss_sales_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_sales_price
            description: Sales price per unit
            ai_context:
              synonyms:
                - "unit price"
                - "price"

          - name: ss_ext_sales_price
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_ext_sales_price
            description: Extended sales price (quantity * price)
            ai_context:
              synonyms:
                - "total price"
                - "line total"

          - name: ss_net_profit
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: ss_net_profit
            description: Net profit from the sale
            ai_context:
              synonyms:
                - "profit"
                - "margin"

    # Dimension table: Date
      - name: date_dim
        source: tpcds.public.date_dim
        primary_key: [d_date_sk]  # Simple primary key
        unique_keys:
          - [d_date_sk]  # Simple key: single column
        description: Date dimension with calendar attributes
        ai_context:
          synonyms:
            - "calendar"
            - "dates"
            - "time periods"

        fields:
          - name: d_date_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_date_sk
            description: Surrogate key for date
            dimension:
              is_time: false

          - name: d_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_date
            description: Actual date value
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "date"
                - "calendar date"

          - name: d_year
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_year
            description: Year
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "year"

          - name: d_quarter_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_quarter_name
            description: Quarter name (e.g., 2024Q1)
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "quarter"
                - "fiscal quarter"

          - name: d_month_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: d_month_name
            description: Month name
            dimension:
              is_time: true
            ai_context:
              synonyms:
                - "month"

# Dimension table: Customer
      - name: customer
        source: tpcds.public.customer
        primary_key: [c_customer_sk]  # Simple primary key
        unique_keys:
          - [c_customer_sk]  # Simple key: single column
        description: Customer dimension with demographic information
        ai_context:
          synonyms:
            - "customers"
            - "shoppers"
            - "buyers"

        fields:
          - name: c_customer_sk
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_customer_sk
            description: Surrogate key for customer
            dimension:
              is_time: false

          - name: c_customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_customer_id
            description: Business key for customer
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "customer ID"
                - "customer number"

          - name: c_first_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_first_name
            description: Customer first name
            dimension:
              is_time: false

          - name: c_last_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_last_name
            description: Customer last name
            dimension:
              is_time: false

          - name: customer_full_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_first_name || ' ' || c_last_name
            description: Customer full name (computed field)
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "full name"
                - "customer name"

          - name: c_email_address
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_email_address
            description: Customer email address
            dimension:
              is_time: false
            ai_context:
              synonyms:
                - "email"
                - "contact"


    relationships:
      - name: store_sales_to_date
        from: store_sales
        to: date_dim
        from_columns: [ss_sold_date_sk]
        to_columns: [d_date_sk]
        ai_context:
          synonyms:
            - "sales date relationship"
            - "when sale occurred"

ontology:
  - concept: StoreSales
    identify_by: [ id ]
    relationships:
      - name: id
        roles:
          - player: StoreSalesNr
        verbalizes: [ "{StoreSales} is identified by {StoreSalesNr}", "{StoreSalesNr} identifies {StoreSales}" ]
      - name: ticket
        roles:
          - player: TicketNr
        verbalizes: [ "{StoreSales} is identified by {TicketNr}", "{TicketNr} identifies {StoreSales}" ]
    entities:
      - entity:
        - role: StoreSales.id
          value: store_sales.ss_item_sk
        - role: StoreSales.ticket
          value: store_sales.ss_sold_date_sk

  - concept: StoreSalesNr
    extends: [ Integer ]

  - concept: TicketNr
    extends: [ Integer ]

  - concept: Customer
    relationships:
      - name: name
        roles:
          - player: CustomerName
        verbalizes: [ "{Customer} is identified by {CustomerName}" ]
    entities:
      - entity:
        - role: Customer.name
          value: customer.customer_full_name

  - concept: CustomerName
    extends: [ String ]

