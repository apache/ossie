# yaml-language-server: $schema=../../../../core-spec/osi-schema.json
#
# Fixture A -- all-native round-trip (OSI -> Omni -> OSI).
# Star schema; every construct maps to a native Omni slot. Documented
# normalizations on the OSI -> Omni -> OSI trip: relationship names are
# regenerated (`<from>_to_<to>`), and unique_keys that merely restate the
# primary key are absorbed by it.

version: "0.2.0.dev0"

semantic_model:
  - name: sales
    description: Sales orders with customer attributes
    ai_context:
      instructions: "Use this model for order analysis."
    datasets:
      - name: orders            # fact: no incoming relationship -> topic base_view
        source: samples.tpch.orders
        primary_key: [o_orderkey]
        description: One row per order
        fields:
          - name: o_orderkey
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: o_orderkey
            description: Order identifier
          - name: o_custkey
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: o_custkey
          - name: o_orderdate
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: o_orderdate
            label: Order Date
            dimension:
              is_time: true
            ai_context:
              synonyms: [order date, date]
          - name: o_totalprice
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: o_totalprice
      - name: customer
        source: samples.tpch.customer
        primary_key: [c_custkey]
        fields:
          - name: c_custkey
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_custkey
          - name: c_name
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: c_name
            description: Customer name
    relationships:
      - name: orders_to_customer
        from: orders
        to: customer
        from_columns: [o_custkey]
        to_columns: [c_custkey]
    metrics:
      - name: total_revenue
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(orders.o_totalprice)
        description: Total order revenue
        ai_context:
          synonyms: [revenue, sales]
      - name: order_count
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: COUNT(*)
        description: Number of orders
