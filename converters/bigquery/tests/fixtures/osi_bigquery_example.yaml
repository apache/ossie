# yaml-language-server: $schema=../../../core-spec/osi-schema.json

# Minimal OSI model exercising the BIGQUERY dialect.
# NOTE: schema validation of the BIGQUERY dialect requires the dialect-enum
# change (see the companion "Add BIGQUERY to the Dialect enum" PR). The
# converter itself also accepts ANSI_SQL-only models with no dependency on that
# change.

version: "0.2.0.dev0"

semantic_model:
  - name: ecommerce_bigquery
    description: Minimal e-commerce model with BigQuery-dialect expressions
    ai_context:
      instructions: "Use for order and customer analysis on BigQuery."

    datasets:
      - name: orders
        source: my_project.sales.orders
        primary_key: [order_id]
        description: Customer orders
        ai_context:
          synonyms:
            - "purchases"
            - "sales"
        fields:
          - name: order_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_id
            description: Order identifier
            dimension:
              is_time: false

          - name: customer_id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: customer_id
            dimension:
              is_time: false

          - name: order_date
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: order_date
            dimension:
              is_time: true

          - name: amount
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: amount

      - name: customers
        source: my_project.sales.customers
        primary_key: [id]
        description: Customer information
        fields:
          - name: id
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: id
            dimension:
              is_time: false

          - name: email_normalized
            expression:
              dialects:
                - dialect: ANSI_SQL
                  expression: LOWER(email)
                - dialect: BIGQUERY
                  expression: SAFE_CAST(LOWER(email) AS STRING)
            description: Normalized email address
            dimension:
              is_time: false

    relationships:
      - name: orders_to_customers
        from: orders
        to: customers
        from_columns: [customer_id]
        to_columns: [id]

    metrics:
      - name: total_revenue
        expression:
          dialects:
            - dialect: ANSI_SQL
              expression: SUM(orders.amount)
            - dialect: BIGQUERY
              expression: SUM(orders.amount)
        description: Total revenue across all orders
        ai_context:
          synonyms:
            - "revenue"
