version: "0.2.0.dev0"
semantic_model:
  - name: tpcds_store_sales
    description: Store sales enriched with date, item, and customer dimensions
    datasets:
      - name: store_sales
        source: tpcds.public.store_sales
        fields:
          - name: ticket_number
            expression:
              dialects: [{dialect: DATABRICKS, expression: ss_ticket_number}]
      - name: date_dim
        source: tpcds.public.date_dim
        primary_key: [d_date_sk]
        fields:
          - name: sold_year
            expression:
              dialects: [{dialect: DATABRICKS, expression: d_year}]
            label: Year
            ai_context: {synonyms: [year, yr]}
          - name: sold_date
            expression:
              dialects: [{dialect: DATABRICKS, expression: d_date}]
      - name: item
        source: tpcds.public.item
        primary_key: [i_item_sk]
        fields:
          - name: item_category
            expression:
              dialects: [{dialect: DATABRICKS, expression: i_category}]
            ai_context: {synonyms: [category, product type]}
          - name: item_brand
            expression:
              dialects: [{dialect: DATABRICKS, expression: i_brand}]
      - name: customer
        source: tpcds.public.customer
        primary_key: [c_customer_sk]
        fields:
          - name: birth_country
            expression:
              dialects: [{dialect: DATABRICKS, expression: c_birth_country}]
    relationships:
      - name: store_sales_to_date_dim
        from: store_sales
        to: date_dim
        from_columns: [ss_sold_date_sk]
        to_columns: [d_date_sk]
      - name: store_sales_to_item
        from: store_sales
        to: item
        from_columns: [ss_item_sk]
        to_columns: [i_item_sk]
      - name: store_sales_to_customer
        from: store_sales
        to: customer
        from_columns: [ss_customer_sk]
        to_columns: [c_customer_sk]
    metrics:
      - name: total_sales
        expression:
          dialects: [{dialect: DATABRICKS, expression: SUM(ss_ext_sales_price)}]
        description: Total sales revenue
        custom_extensions:
          - vendor_name: DATABRICKS
            data: '{"format": {"type": "currency", "currency_code": "USD"}}'
      - name: total_quantity
        expression:
          dialects: [{dialect: DATABRICKS, expression: SUM(ss_quantity)}]
        description: Total units sold
    custom_extensions:
      - vendor_name: DATABRICKS
        data: '{"filter": "ss_net_profit > 0"}'
