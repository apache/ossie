version: 0.2.0.dev0
semantic_model:
- name: sales
  description: Sales model
  ai_context:
    instructions: Use approved metrics
  datasets:
  - name: orders
    source: analytics.public.orders
    primary_key:
    - order_id
    description: Orders
    ai_context:
      synonyms:
      - purchases
    fields:
    - name: order_id
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: order_id
      dimension:
        is_time: false
    - name: customer_id
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: customer_id
      dimension:
        is_time: false
    - name: order_date
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: order_date
      dimension:
        is_time: true
    - name: net_total
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: subtotal - discount
      dimension:
        is_time: false
  - name: customers
    source: analytics.public.customers
    primary_key:
    - customer_id
    fields:
    - name: customer_id
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: customer_id
      dimension:
        is_time: false
    - name: customer_name
      expression:
        dialects:
        - dialect: ANSI_SQL
          expression: name
      dimension:
        is_time: false
  relationships:
  - name: orders_to_customers
    from: orders
    to: customers
    from_columns:
    - customer_id
    to_columns:
    - customer_id
  metrics:
  - name: revenue_per_customer
    description: Revenue per customer
    expression:
      dialects:
      - dialect: ANSI_SQL
        expression: SUM(orders.subtotal) / COUNT(DISTINCT customers.customer_id)
      - dialect: SNOWFLAKE
        expression: SUM(orders.subtotal)::NUMBER / COUNT(DISTINCT customers.customer_id)
