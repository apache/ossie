name: PR Title Check

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  contents: read

jobs:
  check-pr-title:
    if: github.repository_owner == 'apache'
    runs-on: ubuntu-latest
    env:
      PR_TITLE: ${{ github.event.pull_request.title }}
    steps:
      - name: Check PR title format
        run: |
          # Enforce "Area: Description" format
          # Examples: "Converter/dbt: Add metric support", "CLI: Fix plugin listing", "Spec: Update entity schema"
          PATTERN='^(Revert ")?[A-Za-z][A-Za-z0-9._+/&,-]*( [A-Za-z0-9][A-Za-z0-9._+/&,-]*)*: .+'
          if ! echo "$PR_TITLE" | grep -Eq "$PATTERN"; then
            echo "::error::PR title must follow 'Area: Description' format."
            echo ""
            echo "Examples:"
            echo "  Converter/dbt: Add metric support"
            echo "  CLI: Fix plugin listing"
            echo "  Spec: Update entity schema"
            echo "  Infra: Add community workflows"
            echo "  Docs: Update contributing guide"
            echo ""
            echo "Valid area prefixes include: Converter/<name>, CLI, Spec, Ontology, Docs, Infra, Validation, Examples"
            exit 1
          fi
