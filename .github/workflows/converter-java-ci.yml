name: Java CI

on:
  push:
    paths:
      - 'converters/java/**'
      - 'core-spec/**'
      - '.github/workflows/converter-java-ci.yml'
  pull_request:
    paths:
      - 'converters/java/**'
      - 'core-spec/**'
      - '.github/workflows/converter-java-ci.yml'

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: converters/java

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: 'converters/java/**/pom.xml'

      - name: Maven verify
        run: mvn --batch-mode --no-transfer-progress clean verify
