# Shared strict mypy rules for this repo's Python packages.
#
# mypy has no `extends`/`include` directive for config files, and a
# package's own pyproject.toml can't declaratively "point at" another
# config file the way ruff's `extend` does -- mypy only ever reads one
# config file per run, chosen by `--config-file` or fixed discovery in the
# current working directory (it doesn't search upward like ruff/eslint).
#
# So each package invokes mypy with this file explicit, e.g. from
# python/ossie-sql/:
#
#     uv run mypy --config-file ../../mypy.ini src tests
#
# Target paths are passed on the command line (not listed here as `files =`)
# so they're always resolved relative to the invoking package's own
# directory, regardless of where this shared file lives.
[mypy]
python_version = 3.11
strict = True

[mypy-sqlglot.*]
# sqlglot ships inline types but not a py.typed marker on all versions.
ignore_missing_imports = True
