      - tests/predicate_routing/medium/T-005b_aggregate_in_where_rejected/
      - tests/predicate_routing/medium/T-005c_non_aggregate_in_having_rejected/
      - tests/predicate_routing/hard/T-005d_mixed_predicate_level_rejected/
      - tests/predicate_routing/hard/T-005e_boolean_home_grain_scalar_in_where_accepted/
    status: must_pass

  - id: D-006
    title: Bare-name resolves to global namespace; dataset-scoped via dataset.field
