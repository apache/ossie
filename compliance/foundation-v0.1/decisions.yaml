# Foundation Conformance Decisions — runnable test mapping.
#
# Mirrors Appendix B of ../../proposals/foundation-v0.1/Proposed_OSI_Semantics.md.
# Every D-NNN listed there has at least one row here pinning it to a
# T-NNN test case under tests/. The runner emits
# results/decisions_coverage.md after every run so gaps are visible.
#
# Status:
#   * must_pass — the engine MUST pass every T-NNN test pinned to this
#     decision; failure is a Foundation conformance failure.
#   * xfail    — the test is shipped but expected to fail until the
#     named sprint flips it; xfail_pinned_to identifies the sprint.

version: "0.1"

decisions:
  - id: D-001
    title: Aggregation result cardinality + multi-measure stitch on incompatible roots
    spec_ref: §5.1.1, §6.2, §6.6
    tests:
      - tests/query_shape/easy/T-001_distinct_dimensions/
      - tests/joins_default/medium/T-011_multi_measure_full_outer_stitch/
    status: must_pass

  - id: D-002
    title: All measures resolve at the query's grain (no per-aggregate native granularity leak)
    spec_ref: §6.2
    tests:
      - tests/query_shape/medium/T-002a_two_measures_one_grain/
    status: must_pass

  - id: D-003
    title: Implicit home-grain aggregation in field expressions
    spec_ref: §4.3.1
    tests:
      - tests/field_metric_grain/medium/T-004_lifetime_value_field/
    status: must_pass

  - id: D-004
    title: Default join shapes (LEFT for N:1; FULL OUTER stitch; CROSS JOIN of 1-row scalars)
    spec_ref: §6.6
    tests:
      - tests/joins_default/easy/T-006_left_orphans_null_segment/
      - tests/joins_default/medium/T-011_multi_measure_full_outer_stitch/
      - tests/joins_default/medium/T-047_scalar_grand_totals_cross_join/
    status: must_pass

  - id: D-005
    title: Routing of predicates by resolved expression shape (no role: keyword)
    spec_ref: §4.3, §6.3
