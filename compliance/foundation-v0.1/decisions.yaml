  - id: D-027
    title: |
      Bare cross-grain aggregate over an N:N edge resolves via the §6.8.1
      bridge-dedup construction in a single pass for every aggregate
      category (distributive, algebraic, holistic). The "per-home-row-first"
      interpretation requires the nested form AGG(AGG(...)), which is
      deferred to §10 and raises E_NESTED_AGGREGATION_DEFERRED.
    spec_ref: §4.5 form (1), §6.8.1
    tests:
      - tests/bridge/hard/t-015-bridge-dedup/                             # SUM (distributive)
      - tests/bridge/hard/t-016-non-distributive-over-bridge-accepted/    # AVG (algebraic)
      - tests/bridge/hard/t-051-holistic-over-bridge-accepted/            # MEDIAN (holistic)
      - tests/bridge/hard/t-021-count-distinct-fanout/                    # COUNT(DISTINCT)
      - tests/deferred/easy/t-044-nested-aggregation-rejection/           # nested form deferred
    status: must_pass

