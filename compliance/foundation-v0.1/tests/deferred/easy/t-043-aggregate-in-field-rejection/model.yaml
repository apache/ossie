name: f_prelude_model
datasets:
  - name: customers
    source: customers
    primary_key: [id]
    fields:
      - {name: id,      expression: id,      dimension: {}}
      - {name: region,  expression: region,  dimension: {}}
      - {name: segment, expression: segment, dimension: {}}
  - name: orders
    source: orders
    primary_key: [id]
    fields:
      - {name: id,          expression: id,          dimension: {}}
      - {name: customer_id, expression: customer_id, dimension: {}}
      - {name: status,      expression: status,      dimension: {}}
      - {name: amount,      expression: amount}
      # The offending field: an aggregate function in a field body.
      # Foundation v0.1 §4.3 / D-003 rejects every aggregate-bodied
      # field — same-grain or cross-grain. The migration is to move
      # the aggregate to a top-level metric:
      #   total_amount = SUM(orders.amount)
      - {name: total_amount, expression: "SUM(amount)"}
relationships:
  - {name: orders_to_customer,  from: orders,  to: customers, from_columns: [customer_id], to_columns: [id]}
metrics:
  - {name: total_revenue,  expression: "SUM(orders.amount)"}
