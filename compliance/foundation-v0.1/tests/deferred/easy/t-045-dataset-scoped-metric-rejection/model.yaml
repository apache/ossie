name: f_prelude_model
datasets:
  - name: customers
    source: customers
    primary_key: [id]
    fields:
      - {name: id,      expression: id,      dimension: {}}
      - {name: region,  expression: region,  dimension: {}}
      - {name: segment, expression: segment, dimension: {}}
  - name: orders
    source: orders
    primary_key: [id]
    fields:
      - {name: id,          expression: id,          dimension: {}}
      - {name: customer_id, expression: customer_id, dimension: {}}
      - {name: status,      expression: status,      dimension: {}}
      - {name: amount,      expression: amount}
    # The offender: a per-dataset `metrics:` block. Foundation v0.1
    # §4.5 collapses every metric into the top-level `metrics:`
    # section so the home dataset is fixed by reference, not by
    # nesting position. Migration: lift the entries to the top-level
    # `metrics:` and qualify the body with the dataset name —
    # `orders.total_revenue = SUM(amount)` becomes top-level
    # `total_revenue = SUM(orders.amount)`.
    metrics:
      - {name: total_revenue, expression: "SUM(amount)"}
relationships:
  - {name: orders_to_customer,  from: orders,  to: customers, from_columns: [customer_id], to_columns: [id]}
