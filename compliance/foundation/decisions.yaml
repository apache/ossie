  - id: D-026
    title: Bridge resolution materializes distinct (fact, group-key) — Semantic 2
    spec_ref: "§6.1 Semantic 2, §6.8.1"
    tests: []
    status: must_pass

  - id: D-027
    title: |
      Bare cross-grain aggregate over an N:N edge resolves via the §6.8.1
      bridge-dedup construction in a single pass for every aggregate
      category (distributive, algebraic, holistic). The "per-home-row-first"
      interpretation requires the nested form AGG(AGG(...)), which is
      deferred to §10 and raises E_NESTED_AGGREGATION_DEFERRED.
    spec_ref: "§4.5 form (1), §6.8.1"
    tests: []
    status: must_pass

  - id: D-028
    title: Standard SQL window functions in Measures / Fields / Order By / Having; Where ⇒ E_WINDOW_IN_WHERE
    spec_ref: §6.10.1
    tests: []
    status: must_pass

  - id: D-029
    title: NULLS LAST default for outer Order By + OVER ORDER BY; emitted explicitly into compiled SQL
    spec_ref: "§5.1, §6.10.2"
    tests: []
    status: must_pass

  - id: D-030
    title: Window over fan-out ⇒ pre-fan-out materialization (or E_WINDOW_OVER_FANOUT_REWRITE)
    spec_ref: §6.10.3
    tests: []
    status: must_pass

  - id: D-031
    title: Composing a metric on top of a windowed metric ⇒ E_WINDOWED_METRIC_COMPOSITION
    spec_ref: §6.10.5
    tests: []
    status: must_pass

  - id: D-032
    title: "ROWS / RANGE with integer-literal bounds only; GROUPS or :param ⇒ E_DEFERRED_FRAME_MODE"
    spec_ref: §6.10.6
    tests: []
    status: must_pass

  - id: D-033
    title: Empty / NULL aggregate behaviour follows standard SQL (COUNT⇒0, others⇒NULL)
    spec_ref: "§6.11.1, §6.11.2"
    tests: []
    status: must_pass
